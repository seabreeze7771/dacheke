# 站点基础配置
# 自定义域名 dacheke.org（已绑定 GitHub Pages + CNAME）
# 本地预览时 hugo server 会自动用 http://localhost:1313/，不受影响
baseURL = "https://dacheke.org/"
defaultContentLanguage = "zh-cn"
locale = "zh-cn"
title = "搭车客指南"
theme = "hitchhiker"
[pagination]
  pagerSize = 20

enableRobotsTXT = true
enableEmoji = true
buildDrafts = false
buildFuture = false
enableGitInfo = true

# 自动生成文章最后修改时间（基于 git）
[frontmatter]
  lastmod = ["lastmod", ":git", "date"]

[params]
  description = "不要恐慌，搭车穿越数字银河 · 记录 AI、流量与漫游的日常"
  author = "dacheke"
  # 条目来源 section（四大板块）
  mainSections = ["ai", "media-buy", "life", "toolbox"]
  # 文章页功能开关
  ShowWordCount = true
  ShowPostNavLinks = true

  # ---------- 搭车客特色配置 ----------
  [params.hitchhiker]
    # 首页封面随机副标题（每次刷新随机一条）
    slogans = [
      "不 要 恐 慌",
      "答 案 是 42",
      "永 远 知 道 你 的 毛 巾 在 哪 里",
      "飞 船 没 造 好 但 路 已 经 在 了",
      "带 上 毛 巾 上 路"
    ]
    # 阅读时长梗：搭车客标准阅读速度（字/秒）
    readingSpeed = 42
    # 页脚毛巾点击随机台词
    towelQuotes = [
      "永远知道你的毛巾在哪里。",
      "一条毛巾，是搭车客能拥有的最有用的东西。",
      "别慌。",
      "42。",
      "飞得越高，摔得越想飞。"
    ]
    # 控制台彩蛋（F12 可见）
    consoleGreeting = "DON'T PANIC\n欢迎来到搭车客指南 v1.0\n生命、宇宙与一切的终极答案：42"

  # 四大板块元信息（首页卡片、栏目页头部、条目元信息共用）
  [[params.sections]]
    id = "ai"
    icon = "🚀"
    name = "引擎手册"
    subtitle = "AI"
    intro = "无限不可能引擎操作手册，用 AI 撬动效率边界。"
  [[params.sections]]
    id = "media-buy"
    icon = "🛰️"
    name = "航道攻略"
    subtitle = "Media Buy"
    intro = "数字世界的流量航道图，记录投放、套利与踩坑。"
  [[params.sections]]
    id = "life"
    icon = "🌌"
    name = "漫游札记"
    subtitle = "生活感悟"
    intro = "星际旅途的见闻与思考，答案在路上。"
  [[params.sections]]
    id = "toolbox"
    icon = "🧰"
    name = "搭车工具箱"
    subtitle = "工具与资源"
    intro = "搭车客的随身装备，精选工具与资源。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/seabreeze7771"

  # ---------- Giscus 评论（需填写 repo / repoId / categoryId 后开启）----------
  # 获取方式：https://giscus.app 选好仓库后复制配置
  [params.giscus]
    repo = ""                      # 例: "seabreeze7771/dacheke"
    repoId = ""                    # giscus.app 生成
    category = "Announcements"     # Discussions 分类名
    categoryId = ""                # giscus.app 生成
    theme = "preferred_color_scheme"

# Markdown 渲染
[markup]
  [markup.highlight]
    # 适合米色纸面的浅色高亮
    style = "tango"
    lineNos = false
    codeFences = true
    guessSyntax = true
    tabWidth = 2
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  # GFM 风格告示块语法（> [!tip] / [!warning] / [!panic]）
  [markup.goldmark.parser]
    [markup.goldmark.parser.attribute]
      title = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.typography]
        disable = false

# 输出：HTML + RSS（无站内搜索，去掉 JSON）
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# 导航菜单 —— 四大板块 + 归档 + 关于
[[menu.main]]
  identifier = "ai"
  name = "引擎手册"
  url = "/ai/"
  weight = 5
[[menu.main]]
  identifier = "media-buy"
  name = "航道攻略"
  url = "/media-buy/"
  weight = 10
[[menu.main]]
  identifier = "life"
  name = "漫游札记"
  url = "/life/"
  weight = 15
[[menu.main]]
  identifier = "toolbox"
  name = "工具箱"
  url = "/toolbox/"
  weight = 20
[[menu.main]]
  identifier = "archives"
  name = "总目录"
  url = "/archives/"
  weight = 25
[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 30
