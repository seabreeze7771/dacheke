# 站点基础配置
# 自定义域名 dacheke.org（已绑定 GitHub Pages + CNAME）
# 本地预览时 hugo server 会自动用 http://localhost:1313/，不受影响
baseURL = "https://dacheke.org/"
defaultContentLanguage = "zh-cn"
locale = "zh-cn"
title = "搭车客"
theme = "PaperMod"
[pagination]
  pagerSize = 10

enableRobotsTXT = true
enableEmoji = true
buildDrafts = false
buildFuture = false
enableGitInfo = true

# 自动生成文章最后修改时间（基于 git）
[frontmatter]
  lastmod = ["lastmod", ":git", "date"]

[params]
  env = "production"
  defaultTheme = "auto"
  description = "一本个人的银河搭车指南 · 记录 AI、Media Buy 与路上的感悟"
  author = "dacheke"
  # 首页"最新文章"列表的来源 section（四个板块）
  mainSections = ["ai", "media-buy", "life", "toolbox"]
  # 文章页功能开关
  ShowReadingTime = true
  ShowWordCount = false
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false
  ShowToc = true
  TocOpen = false
  # 首页文章摘要字数
  summaryLength = 80

  [params.homeInfoParams]
    Title = "搭车客"
    Content = "**DON'T PANIC** — 一本个人的银河搭车指南。\n记录引擎（AI）、航线（Media Buy）、漫游（生活）与一路上攒下的工具。"

  [params.footer]
    text = "DON'T PANIC"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/seabreeze7771"

# Markdown 渲染
[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    codeFences = true
    guessSyntax = true
    tabWidth = 2
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  # GFM 风格告示块语法（> [!tip] / [!warning] / [!panic]）
  [markup.goldmark.parser]
    [markup.goldmark.parser.attribute]
      title = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.typography]
        disable = false

# 启用搜索所需的 JSON 输出
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 导航菜单 —— 四大板块
[[menu.main]]
  identifier = "ai"
  name = "引擎手册"
  url = "/ai/"
  weight = 5
[[menu.main]]
  identifier = "media-buy"
  name = "航行日志"
  url = "/media-buy/"
  weight = 10
[[menu.main]]
  identifier = "life"
  name = "漫游札记"
  url = "/life/"
  weight = 15
[[menu.main]]
  identifier = "toolbox"
  name = "工具箱"
  url = "/toolbox/"
  weight = 20
[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 25
[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 30
