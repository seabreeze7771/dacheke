{{- /* 搭车客提示区块：文章正文结尾的「指南条目」，用 front matter 的 tip 参数 */ -}}
{{- with .Params.tip }}
<aside class="hh-tip">
  <div class="hh-tip-head">
    <span class="hh-tip-towel" aria-hidden="true">🧖</span>
    <span class="hh-tip-label">搭车客提示</span>
  </div>
  <div class="hh-tip-body">{{ . | markdownify }}</div>
</aside>
{{- end }}
