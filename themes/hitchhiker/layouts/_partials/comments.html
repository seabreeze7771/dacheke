{{- /* 搭车客指南：Giscus 评论 + 沃贡诗歌彩蛋 */ -}}
{{- $g := site.Params.giscus | default (dict) -}}

{{- if $g.repo }}
<section class="comments" style="margin-top:2.6em">
  <p style="text-align:center;font-family:var(--font-mono);font-size:0.78rem;color:var(--ink-3);margin-bottom:16px;padding:8px 0;border-top:1px dashed var(--rule);border-bottom:1px dashed var(--rule)">
    请文明留言，沃贡诗歌禁止入内。🛸
  </p>
  <script src="https://giscus.app/client.js"
          data-repo="{{ $g.repo }}"
          data-repo-id="{{ $g.repoId }}"
          data-category="{{ $g.category | default "Announcements" }}"
          data-category-id="{{ $g.categoryId }}"
          data-mapping="pathname"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="top"
          data-theme="{{ $g.theme | default "preferred_color_scheme" }}"
          data-lang="zh-CN"
          data-loading="lazy"
          crossorigin="anonymous"
          async>
  </script>
</section>
{{- end -}}
